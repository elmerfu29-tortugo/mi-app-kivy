name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build APK with Docker
      uses: docker://kivy/buildozer:latest
      env:
        BUILDOZER_ROOT_IGNORE: 1  # 👈 Esto evita la pregunta
      with:
        args: |
          bash -c "
            buildozer init &&
            sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec &&
            sed -i 's/^android.api = .*/android.api = 30/' buildozer.spec &&
            sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec &&
            buildozer android debug
          "
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: ./bin/*.apk
